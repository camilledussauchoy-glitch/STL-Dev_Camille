name: Create Release from Version Tag & Changelog

on:
  push:
    tags:
      - 'v*'  # trigger the workflow on version tags (like v1.0.0)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # clone the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      # extract the relevant section from CHANGELOG.md
      - name: Extract changelog section
        id: changelog
        run: |
            TAG=${GITHUB_REF#refs/tags/}
            echo "Tag detected: $TAG"
            CONTENT=$(python3 -c "
            import re
            tag = '$TAG'
            with open('CHANGELOG.md', 'r') as f:
                changelog = f.read()
            match = re.search(rf'## \[{re.escape(tag)}\].*?(?=## \[|$)', changelog, re.DOTALL)
            if match:
                print(match.group(0))
            ")
            echo "notes=$CONTENT" >> $GITHUB_OUTPUT


      # Github Release step
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
